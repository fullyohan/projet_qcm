<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QST - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #2c3e50; /* Même fond sombre */
            padding-top: 80px;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-box {
            background-color: #ffffff; /* Boîte blanche */
            border: 1px solid #dee2e6;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
            
            <div class="text-center mb-4 text-light">
                <h1 class="fw-bold">L'Est Qo</h1>
                <p class="text-white-50">Connecte-toi pour accéder aux QCM</p>
            </div>

            <div class="login-box p-4">
                <h3 class="h5 fw-bold text-dark mb-4 text-center border-bottom pb-2">Connexion</h3>
                
                <form>
                    <div class="mb-3">
                        <label for="loginIdentifier" class="form-label fw-semibold text-secondary">Pseudo ou Adresse Email</label>
                        <input type="text" class="form-control" id="loginIdentifier" placeholder="Entrez votre pseudo ou email" required>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="loginPassword" class="form-label fw-semibold text-secondary mb-0">Mot de passe</label>
                            <a href="#" class="text-decoration-none" style="font-size: 0.85rem;">Mot de passe oublié ?</a>
                        </div>
                        <input type="password" class="form-control" id="loginPassword" placeholder="Entrez votre mot de passe" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fs-6 fw-bold">Se connecter</button>
                    </div>

                    <div class="text-center mt-3">
                        <small class="text-muted">Pas encore de compte ? <a href="register.html" class="text-decoration-none">S'inscrire</a></small>
                    </div>
                </form>

            </div> </div>
    </div>
</div>

</body>
</html>
