<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCM Master — Résultat final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --emerald-dark: #064e3b;
            --emerald-main: #047857;
            --emerald-light: #10b981;
            --emerald-soft: #ecfdf5;
            --bg-light: #f9fafb;
        }

        body { 
            background-color: var(--bg-light); 
            color: #1f2937;
            font-family: sans-serif; /* Police standard de base */
        }

        .navbar-quiz {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
        }

        .result-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
        }

        .score-badge {
            background-color: var(--emerald-soft);
            color: var(--emerald-dark);
            font-size: 3rem;
            font-weight: 800;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 2px solid var(--emerald-light);
        }

        .btn-emerald {
            background-color: var(--emerald-main);
            color: white;
            font-weight: 600;
            border: none;
        }
        .btn-emerald:hover { 
            background-color: var(--emerald-dark); 
            color: white;
        }
    </style>
</head>
<body>

    <nav class="navbar-quiz py-3 shadow-sm mb-4">
        <div class="container">
            <span class="fw-bold text-dark">💡 QCM<span style="color:var(--emerald-light)">Master</span></span>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <div class="card result-card p-4 p-sm-5 text-center shadow-none mt-4">
                    <h2 class="fw-bold text-dark mb-2">Évaluation Terminée !</h2>
                    <p class="text-secondary small mb-5">Merci d'avoir complété le questionnaire.</p>
                    
                    <div class="mb-4">
                        <div class="score-badge mb-2">
                            <span>16</span>
                        </div>
                        <span class="fw-bold text-secondary small">NOTE FINALE SUR 20</span>
                    </div>

                    <div class="p-3 bg-light rounded-3 mb-5 text-start">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Questions réussies :</span>
                            <span class="fw-bold text-success">8 / 10</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span>Temps mis :</span>
                            <span class="fw-bold text-dark">06:42</span>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <a href="historique.html" class="btn btn-emerald py-3 fw-bold">Voir le détail de mes erreurs</a>
                        <a href="#" class="btn btn-link text-secondary text-decoration-none small mt-2">Retour au menu</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
