<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QST - Catégorie T</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #253245;
            padding-top: 50px;
        }
        .quiz-box {
            width: 80%;
            margin:auto;
            background-color: #2a6133;
            border: 1px solid #33495e;
            border-radius: 8px;
        }
        /* Boutons de réponse simples et larges */
        .answer-link {
            text-align: left;
            padding: 12px;
            border: 1px solid #212529;
            background-color: #422c39;
            border-radius: 6px;
            color: #212529;
        }
        .answer-link:hover {
            background-color: #e9ecef;
            border-color: #adb5bd;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="text-center mb-4">
                <h1 class="fw-bold text-secondary">L'Est Qo</h1>
                <p class="text-muted">Répond aux questions de la catégorie T</p>
            </div>

            <div class="quiz-box p-4 mb-4">
                
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-primary fw-bold">Catégorie S</span>
                    <span class="text-muted">Question 1 / 10</span>
                </div>

                <h4 class="mb-4">Qu'est ce qui est rond rouge un legume et fruit </h4>

                <div class="mb-4">
                    <button type="button" class="answer-link">A. Tomate</button>
                    <button type="button" class="answer-link">B. Tarte</button>
                    <button type="button" class="answer-link">C. Tornade</button>
                    <button type="button" class="answer-link">D. Tartine</button>
                </div>

                <div class="text-end border-bottom pb-3 mb-3">
                    <button type="button" class="btn btn-primary">Question suivante →</button>
                </div>

                <div class="p-3 bg-light rounded text-center">
                    <h5 class="mb-2 text-dark">Résultat final :</h5>
                    <div class="fs-3 fw-bold text-success">
                        <span>16</span> / 20
                    </div>
                    <small class="text-muted">La note s'affiche une fois les 10 questions validées.</small>
                </div>

            </div> </div>
    </div>
</div>

</body>
</html>
