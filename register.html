<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QST - Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #2c3e50; /* Même fond sombre que ton QCM */
            padding-top: 60px;
            padding-bottom: 60px;
            font-family: 'Segoe UI', sans-serif;
        }
        .register-box {
            background-color: #ffffff; /* Boîte blanche pour le contraste */
            border: 1px solid #dee2e6;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5"> <div class="text-center mb-4 text-light">
                <h1 class="fw-bold">L'Est Qo</h1>
                <p class="text-white-50">Crée ton compte pour sauvegarder tes notes sur 20</p>
            </div>

            <div class="register-box p-4">
                <h3 class="h5 fw-bold text-dark mb-4 text-center border-bottom pb-2">Inscription</h3>
                
                <form>
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-secondary">Pseudo</label>
                        <input type="text" class="form-control" id="username" placeholder="Ex: Jean123" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold text-secondary">Adresse Email</label>
                        <input type="email" class="form-control" id="email" placeholder="nom@exemple.com" required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold text-secondary">Mot de passe</label>
                        <input type="password" class="form-control" id="password" placeholder="Au moins 6 caractères" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fs-6 fw-bold">Créer mon compte</button>
                    </div>

                    <div class="text-center mt-3">
                        <small class="text-muted">Déjà un compte ? <a href="login.html" class="text-decoration-none">Se connecter</a></small>
                    </div>
                </form>

            </div> </div>
    </div>
</div>

</body>
</html>
